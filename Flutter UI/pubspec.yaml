name: Gym
description: Gym Coaching MVP Flutter App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.0.0
  go_router: ^13.2.0
  signalr_netcore: ^1.3.7
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1  # ✅ only in dev_dependencies

# ── Splash Screen ────────────────────────────────────────────────────────────
flutter_native_splash:
  color: "#0A0A0F"
  image: assets/images/logo2.png      # centered logo on splash
  color_dark: "#0A0A0F"
  image_dark: assets/images/logo2.png
  android_12:
    color: "#0A0A0F"
    image: assets/images/logo2.png

# ── App Icon ─────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo2.png"   # ✅ use GYM.png for the icon
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/logo2.png"
  windows:
    generate: true
    image_path: "assets/images/logo2.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/